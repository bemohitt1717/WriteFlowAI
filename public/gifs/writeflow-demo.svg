<svg viewBox="0 0 1200 840" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8465cd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b4fb5;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Outer rounded background -->
  <defs>
    <clipPath id="roundedCorners">
      <rect x="0" y="0" width="1200" height="840" rx="24" ry="24"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="840" fill="url(#bgGradient)" clip-path="url(#roundedCorners)"/>
  
  <!-- Subtle accent circles -->
  <circle cx="200" cy="150" r="180" fill="#8465cd" opacity="0.08" filter="url(#glow)" clip-path="url(#roundedCorners)"/>
  <circle cx="1050" cy="750" r="220" fill="#6b4fb5" opacity="0.06" filter="url(#glow)" clip-path="url(#roundedCorners)"/>
  
  <!-- Main Dashboard Card -->
  <rect x="120" y="80" width="960" height="680" rx="20" fill="#252540" stroke="#3a3a5c" stroke-width="1.5" filter="url(#shadow)"/>
  
  <!-- Header Bar -->
  <rect x="120" y="80" width="960" height="65" rx="20" fill="#2a2a4a" stroke="#3a3a5c" stroke-width="1.5"/>
  
  <!-- Logo -->
  <circle cx="170" cy="112" r="18" fill="url(#accentGradient)"/>
  <text x="170" y="119" font-size="22" font-weight="bold" text-anchor="middle" fill="#fff" font-family="system-ui, -apple-system, sans-serif">W</text>
  
  <!-- Header Text -->
  <text x="210" y="105" font-size="16" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">WriteFlow AI</text>
  <text x="210" y="123" font-size="11" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif">Smart Content Generation</text>
  
  <!-- Settings Icon -->
  <circle cx="1050" cy="112" r="16" fill="#3a3a5c" stroke="#4a4a6c" stroke-width="1"/>
  <text x="1050" y="117" font-size="12" text-anchor="middle" fill="#8b8ba3" font-family="system-ui">⚙</text>
  
  <!-- Content Area -->
  
  <!-- Left Sidebar -->
  <rect x="130" y="155" width="130" height="585" fill="#1e1e36" stroke="#3a3a5c" stroke-width="1" rx="12"/>
  
  <!-- Sidebar Menu Items -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Dashboard Active -->
    <rect x="145" y="175" width="100" height="32" rx="8" fill="#8465cd" opacity="0.15" stroke="#8465cd" stroke-width="1"/>
    <text x="155" y="198" font-size="12" font-weight="500" fill="#8465cd">📊 Dashboard</text>
    
    <!-- Create -->
    <text x="155" y="238" font-size="12" font-weight="500" fill="#8b8ba3">✏️ Create</text>
    
    <!-- Templates -->
    <text x="155" y="278" font-size="12" font-weight="500" fill="#8b8ba3">📋 Templates</text>
  </g>
  
  <!-- Main Content Area -->
  
  <!-- Card 1: Blog Writer -->
  <rect x="300" y="170" width="280" height="160" rx="12" fill="#2a2a45" stroke="#3a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="330" cy="200" r="7" fill="#8465cd"/>
  <text x="350" y="205" font-size="14" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">Blog Writer</text>
  <text x="320" y="228" font-size="11" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif">Generate high-quality blogs</text>
  <text x="320" y="245" font-size="11" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif">and articles instantly</text>
  
  <!-- Card 2: Social Media -->
  <rect x="620" y="170" width="280" height="160" rx="12" fill="#2a2a45" stroke="#3a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="650" cy="200" r="7" fill="#00d4ff"/>
  <text x="670" y="205" font-size="14" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">Social Posts</text>
  <text x="640" y="228" font-size="11" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif">Create engaging social</text>
  <text x="640" y="245" font-size="11" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif">media content for any platform</text>
  
  <!-- Card 3: Email & Marketing -->
  <rect x="300" y="365" width="600" height="140" rx="12" fill="#2a2a45" stroke="#3a3a5c" stroke-width="1" filter="url(#shadow)"/>
  <circle cx="330" cy="395" r="7" fill="#4ade80"/>
  <text x="350" y="400" font-size="14" font-weight="600" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif">Email & Marketing</text>
  <text x="330" y="425" font-size="11" fill="#a0a0b8" font-family="system-ui, -apple-system, sans-serif">Compose professional emails, newsletters, and marketing campaigns</text>
  
  <!-- Quick Stats Row -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Stat 1 -->
    <text x="320" y="540" font-size="11" fill="#8b8ba3">⚡ 2.3s</text>
    <text x="320" y="558" font-size="10" fill="#a0a0b8">Avg. Speed</text>
    
    <!-- Stat 2 -->
    <text x="500" y="540" font-size="11" fill="#8b8ba3">✨ 94%</text>
    <text x="500" y="558" font-size="10" fill="#a0a0b8">Quality Score</text>
    
    <!-- Stat 3 -->
    <text x="680" y="540" font-size="11" fill="#8b8ba3">🎯 100%</text>
    <text x="680" y="558" font-size="10" fill="#a0a0b8">Customizable</text>
  </g>
  
  <!-- Feature Badges -->
  <g>
    <rect x="320" y="580" width="85" height="26" rx="13" fill="#8465cd" opacity="0.15" stroke="#8465cd" stroke-width="1"/>
    <text x="362" y="600" font-size="11" fill="#8465cd" text-anchor="middle" font-weight="500" font-family="system-ui, -apple-system, sans-serif">AI Powered</text>
    
    <rect x="425" y="580" width="85" height="26" rx="13" fill="#00d4ff" opacity="0.15" stroke="#00d4ff" stroke-width="1"/>
    <text x="467" y="600" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Lightning Fast</text>
    
    <rect x="530" y="580" width="85" height="26" rx="13" fill="#4ade80" opacity="0.15" stroke="#4ade80" stroke-width="1"/>
    <text x="572" y="600" font-size="11" fill="#4ade80" text-anchor="middle" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Easy to Use</text>
  </g>
</svg>
</svg>