<svg viewBox="0 0 760 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WriteFlow drafting preview</title>
  <desc id="desc">A minimal animated preview showing an idea becoming a clean draft.</desc>
  <defs>
    <linearGradient id="surface" x1="90" y1="64" x2="672" y2="492" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7F3FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="165" y1="159" x2="579" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8465CD"/>
      <stop offset="1" stop-color="#51329A"/>
    </linearGradient>
    <linearGradient id="softAccent" x1="127" y1="136" x2="617" y2="454" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8465CD" stop-opacity=".18"/>
      <stop offset="1" stop-color="#51329A" stop-opacity=".06"/>
    </linearGradient>
    <filter id="shadow" x="34" y="27" width="688" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#140C27" flood-opacity=".12"/>
    </filter>
    <filter id="smallShadow" x="0" y="0" width="760" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#140C27" flood-opacity=".10"/>
    </filter>
    <style>
      #draftCard {
        animation: floatDraft 5.4s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      #ideaChip {
        animation: floatChip 4.8s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      #flowLine {
        stroke-dasharray: 210;
        stroke-dashoffset: 210;
        animation: drawFlow 3.6s ease-in-out infinite;
      }

      #sparkOne,
      #sparkTwo,
      #sparkThree {
        animation: sparkPulse 2.6s ease-in-out infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      #sparkTwo {
        animation-delay: .45s;
      }

      #sparkThree {
        animation-delay: .9s;
      }

      #cursor {
        animation: cursorBlink 1.15s steps(2, start) infinite;
      }

      @keyframes floatDraft {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }

      @keyframes floatChip {
        0%, 100% { transform: translateX(0) translateY(0); }
        50% { transform: translateX(8px) translateY(-7px); }
      }

      @keyframes drawFlow {
        0% { stroke-dashoffset: 210; opacity: .35; }
        42%, 72% { stroke-dashoffset: 0; opacity: 1; }
        100% { stroke-dashoffset: -210; opacity: .35; }
      }

      @keyframes sparkPulse {
        0%, 100% { opacity: .35; transform: scale(.86); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      @keyframes cursorBlink {
        0%, 48% { opacity: 1; }
        49%, 100% { opacity: 0; }
      }

      @media (prefers-reduced-motion: reduce) {
        #draftCard,
        #ideaChip,
        #flowLine,
        #sparkOne,
        #sparkTwo,
        #sparkThree,
        #cursor {
          animation: none;
        }
      }
    </style>
  </defs>

  <rect x="28" y="30" width="704" height="500" rx="38" fill="url(#surface)"/>
  <path d="M70 423C156 360 246 392 336 334C426 276 484 176 690 142V492H70V423Z" fill="url(#softAccent)"/>

  <g filter="url(#shadow)">
    <rect x="82" y="74" width="596" height="398" rx="28" fill="#FFFFFF" stroke="#DED6EE" stroke-width="2"/>
    <rect x="82" y="74" width="596" height="70" rx="28" fill="#FBF9FF"/>
    <path d="M82 129H678" stroke="#DED6EE" stroke-width="2"/>
    <circle cx="122" cy="109" r="7" fill="#8465CD"/>
    <circle cx="145" cy="109" r="7" fill="#C2B2E6"/>
    <circle cx="168" cy="109" r="7" fill="#E0D8F3"/>
    <rect x="207" y="96" width="180" height="26" rx="13" fill="#F0ECF9"/>
    <rect x="225" y="105" width="105" height="8" rx="4" fill="#8465CD" opacity=".42"/>
    <rect x="596" y="97" width="42" height="24" rx="12" fill="#653EC1" opacity=".12"/>
    <path d="M611 109H623" stroke="#653EC1" stroke-width="2" stroke-linecap="round"/>
  </g>

  <g id="ideaChip" filter="url(#smallShadow)">
    <rect x="134" y="187" width="242" height="132" rx="24" fill="#FFFFFF" stroke="#DED6EE" stroke-width="2"/>
    <rect x="160" y="213" width="72" height="26" rx="13" fill="#653EC1" opacity=".12"/>
    <text x="196" y="231" text-anchor="middle" font-size="13" font-weight="700" fill="#51329A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Idea</text>
    <rect x="160" y="258" width="158" height="12" rx="6" fill="#C2B2E6" opacity=".9"/>
    <rect x="160" y="283" width="114" height="12" rx="6" fill="#E0D8F3"/>
    <rect id="cursor" x="290" y="280" width="4" height="18" rx="2" fill="#653EC1"/>
  </g>

  <path id="flowLine" d="M370 259C418 250 438 220 470 219C504 219 524 249 547 272" fill="none" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M535 273L553 275L546 258" fill="none" stroke="#51329A" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g id="draftCard" filter="url(#smallShadow)">
    <rect x="438" y="162" width="198" height="256" rx="26" fill="#FFFFFF" stroke="#DED6EE" stroke-width="2"/>
    <rect x="462" y="187" width="76" height="26" rx="13" fill="url(#accent)"/>
    <text x="500" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Draft</text>
    <rect x="462" y="239" width="134" height="13" rx="6.5" fill="#8465CD" opacity=".82"/>
    <rect x="462" y="267" width="114" height="11" rx="5.5" fill="#C2B2E6"/>
    <rect x="462" y="292" width="146" height="11" rx="5.5" fill="#E0D8F3"/>
    <rect x="462" y="317" width="96" height="11" rx="5.5" fill="#E0D8F3"/>
    <rect x="462" y="357" width="116" height="32" rx="16" fill="#653EC1" opacity=".12"/>
    <text x="520" y="378" text-anchor="middle" font-size="13" font-weight="700" fill="#51329A" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">Ready</text>
  </g>

  <g id="sparkOne">
    <path d="M603 130V156M590 143H616" stroke="#8465CD" stroke-width="5" stroke-linecap="round"/>
  </g>
  <g id="sparkTwo">
    <path d="M159 368V388M149 378H169" stroke="#51329A" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g id="sparkThree">
    <path d="M399 392V414M388 403H410" stroke="#8465CD" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
